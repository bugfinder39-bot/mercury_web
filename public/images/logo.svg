<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Brand Icon -->
  <g transform="translate(10, 10)">
    <!-- Main Hexagon / Cargo Container outline -->
    <path d="M 20 0 L 40 10 L 40 30 L 20 40 L 0 30 L 0 10 Z" fill="#0B2540" />
    
    <!-- Stylized Wings / Shipping lines (Amber Accent) -->
    <path d="M 8 15 L 20 22 L 32 15" stroke="#E8770C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 8 23 L 20 30 L 32 23" stroke="#E8770C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Inner structural line -->
    <line x1="20" y1="0" x2="20" y2="40" stroke="#FFFFFF" stroke-width="1.5" stroke-dasharray="2,2" />
  </g>

  <!-- Typography -->
  <!-- "MERCURY" Display Heading (Archivo Expanded style) -->
  <text x="65" y="32" font-family="Archivo, sans-serif" font-size="22" font-weight="700" fill="#0B2540" letter-spacing="1">MERCURY</text>
  
  <!-- "BANGLADESH" Sub-heading (IBM Plex Mono uppercase) -->
  <text x="65" y="46" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="500" fill="#5B6B79" letter-spacing="3.5">BANGLADESH</text>
</svg>
